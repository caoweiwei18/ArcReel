# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies via uv (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: lockfile-only
    # 刚发布的版本先沉淀几天再开 PR，降低撞上「发布即回归」的概率
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
    labels:
      - "dependencies"
      - "python:uv"
    commit-message:
      prefix: "chore(deps)"
    # 各域分组只收 minor/patch，聚合成可安全自动合并的 PR；
    # major 不匹配任何分组 → 单独成 PR，留给人工审查。
    groups:
      fastapi-stack:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic*"
          - "python-multipart"
          - "python-dotenv"
        update-types:
          - "minor"
          - "patch"
      database:
        patterns:
          - "sqlalchemy*"
          - "aiosqlite"
          - "asyncpg"
          - "alembic"
        update-types:
          - "minor"
          - "patch"
      ai-sdks:
        patterns:
          - "claude-agent-sdk"
          - "google-genai"
          - "openai"
          - "volcengine-python-sdk*"
          - "xai-sdk"
          - "instructor"
        update-types:
          - "minor"
          - "patch"
      auth:
        patterns:
          - "pyjwt"
          - "pwdlib*"
        update-types:
          - "minor"
          - "patch"
      media:
        patterns:
          - "Pillow"
          - "ffmpeg-python"
          - "pyjianyingdraft"
        update-types:
          - "minor"
          - "patch"
      document-parsing:
        patterns:
          - "pdf-oxide"
          - "mammoth"
          - "docx2txt"
          - "ebooklib"
          - "beautifulsoup4"
          - "lxml"
          - "charset-normalizer"
        update-types:
          - "minor"
          - "patch"
      backend-core:
        patterns:
          - "PyYAML"
          - "packaging"
          - "portalocker"
          - "socksio"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "basedpyright"
          - "pre-commit"
          - "python-docx"
        update-types:
          - "minor"
          - "patch"
      all-other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Frontend npm dependencies (pnpm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # ^ range 内的升级只动 lockfile；超出 range（major）才改 package.json 并开 PR
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      i18n:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
        update-types:
          - "minor"
          - "patch"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
        update-types:
          - "minor"
          - "patch"
      ui-libs:
        patterns:
          - "framer-motion"
          - "lucide-react"
          - "@floating-ui/*"
          - "@lobehub/*"
          - "@tanstack/react-virtual"
          - "streamdown"
        update-types:
          - "minor"
          - "patch"
      vite-tailwind:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
        update-types:
          - "minor"
          - "patch"
      eslint-stack:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - "minor"
          - "patch"
      app-core:
        patterns:
          - "wouter"
          - "zustand"
          - "@headlessui/react"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      all-other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # github-actions 生态只支持 default-days，不支持 semver 粒度的冷却字段
    cooldown:
      default-days: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
